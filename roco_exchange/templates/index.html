<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洛克王国精灵蛋互换站</title>
    <style>
        :root { --primary: #ffcc00; --bg: #fff9e6; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        
        /* 📱 响应式输入组：手机自动堆叠，电脑横排 */
        .input-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
        input { flex: 1 1 200px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        
        .publish-btn { background: var(--primary); border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }

        /* 🏷️ 标签选择区域 */
        .tag-box { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .tag-label { font-weight: bold; margin-bottom: 8px; display: block; color: #666; }
        .tag-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        .tag-btn { 
            background: #f0f0f0; border: none; padding: 6px 12px; border-radius: 20px; 
            font-size: 14px; cursor: pointer; transition: 0.3s;
        }
        .tag-btn:active { background: var(--primary); transform: scale(0.95); }

        /* 📋 看板排版：修复文字溢出 */
        .trade-card { 
            background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 5px solid var(--primary);
            word-break: break-all; line-height: 1.6;
        }
        .trade-header { display: flex; justify-content: space-between; color: #888; font-size: 13px; margin-bottom: 5px; }
        .pet-info { font-size: 16px; color: #333; }
        .pet-tag { color: #ff6600; font-weight: bold; margin-right: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align:center; color:#d4a017;">🥚 精灵蛋互换站</h2>

        <!-- 发布表单 -->
        <form action="/post" method="POST" class="tag-box">
            <div class="input-group">
                <input type="text" name="uid" placeholder="你的UID" required>
                <input type="text" name="have_pet" id="have_input" placeholder="我有... (点击下方标签添加)" required>
                <input type="text" name="want_pet" placeholder="我想换..." required>
            </div>

            <span class="tag-label">🏅 奖牌特质:</span>
            <div class="tag-container">
                <button type="button" class="tag-btn" onclick="addTag('粗嗓门')">粗嗓门</button>
                <button type="button" class="tag-btn" onclick="addTag('婉转声')">婉转声</button>
                <button type="button" class="tag-btn" onclick="addTag('大块头')">大块头</button>
                <button type="button" class="tag-btn" onclick="addTag('小不点')">小不点</button>
            </div>

            <span class="tag-label">🧠 性格特质:</span>
            <div class="tag-container">
                <button type="button" class="tag-btn" onclick="addTag('聪明')">聪明</button>
                <button type="button" class="tag-btn" onclick="addTag('固执')">固执</button>
                <button type="button" class="tag-btn" onclick="addTag('胆小')">胆小</button>
                <button type="button" class="tag-btn" onclick="addTag('开朗')">开朗</button>
                <button type="button" class="tag-btn" onclick="addTag('急躁')">急躁</button>
                <button type="button" class="tag-btn" onclick="addTag('莽撞')">莽撞</button>
            </div>
            
            <button type="submit" class="publish-btn">发布互换信息</button>
        </form>

        <!-- 搜索框 -->
        <form action="/" method="GET" style="display:flex; gap:5px; margin-bottom:20px;">
            <input type="text" name="search" placeholder="搜索精灵、UID或特质(如:大块头)...">
            <button type="submit" style="background:#333; color:white; border:none; border-radius:8px; padding:0 20px;">搜索</button>
        </form>

        <!-- 互换列表 -->
        <div id="board">
            {% for trade in trades %}
            <div class="trade-card">
                <div class="trade-header"><span>UID: {{ trade.uid }}</span></div>
                <div class="pet-info"><strong>我有：</strong>{{ trade.have_pet }}</div>
                <div class="pet-info"><strong>想换：</strong>{{ trade.want_pet }}</div>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        function addTag(tagName) {
            const input = document.getElementById('have_input');
            // 自动添加空格隔开标签
            input.value += (input.value ? " " : "") + tagName;
        }
    </script>
</body>
</html>
