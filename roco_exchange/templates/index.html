<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洛克王国精灵蛋互换站</title>
    <style>
        body { background-color: #fdf5e6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; color: #5d4037; }
        
        .signature { font-size: 12px; color: #8d6e63; opacity: 0.7; margin-bottom: 10px; text-align: center; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #ff8c00; display: flex; align-items: center; justify-content: center; gap: 10px; }

        .top-container { max-width: 800px; margin: 0 auto 30px auto; display: flex; flex-direction: column; gap: 15px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        
        /* 搜索和发布表单样式 */
        .inline-form { display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #eee; border-radius: 8px; outline: none; }
        .btn { background: #ffcc00; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #ffb300; }

        /* 核心布局：左右并排 */
        .main-content { 
            display: flex; 
            max-width: 1100px; 
            margin: 0 auto; 
            gap: 25px; 
            align-items: flex-start; /* ✨ 核心修复：确保顶部对齐 */
        }

        .left-panel { flex: 1.5; min-width: 0; } /* 看板 */
        .right-panel { flex: 1; min-width: 0; }  /* 留言板 */

        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #f9f9f9; }
        th { background: #fffde7; font-size: 14px; }

        .msg-list { max-height: 500px; overflow-y: auto; margin-top: 15px; }
        .msg-item { 
            background: #fffbe6; padding: 12px; border-radius: 10px; margin-bottom: 10px; 
            border-left: 4px solid #ffcc00; font-size: 14px; line-height: 1.6;
            word-wrap: break-word; white-space: pre-wrap;
        }

        @media (max-width: 850px) {
            .main-content { flex-direction: column; }
            .left-panel, .right-panel { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="signature">开发者: 发丝(洛克王国世界) & Gemini 3 Flash (Google AI) | 致力于更好的玩家体验</div>

    <div class="header">
        <h1>🥚 洛克王国精灵蛋互换站</h1>
    </div>

    <div class="top-container">
        <!-- 搜索框 -->
        <div class="card">
            <form action="/" method="get" class="inline-form">
                <input type="text" name="search" placeholder="🔍 搜索精灵名字或 UID..." value="{{ request.args.get('search', '') }}">
                <button type="submit" class="btn">搜索</button>
                <a href="/" style="text-decoration:none; color:#999; font-size:13px; align-self:center;">重置</a>
            </form>
        </div>

        <!-- 发布框 -->
        <div class="card">
            <form action="/post" method="post" class="inline-form">
                <input type="text" name="uid" placeholder="UID" required>
                <input type="text" name="have_pet" placeholder="我有..." required>
                <input type="text" name="want_pet" placeholder="想换..." required>
                <button type="submit" class="btn">发布</button>
            </form>
        </div>
    </div>

    <div class="main-content">
        <!-- 左侧看板 -->
        <div class="left-panel">
            <div class="card">
                <h3>📜 实时互换看板</h3>
                <table>
                    <thead>
                        <tr><th>UID</th><th>我有</th><th>我想换</th></tr>
                    </thead>
                    <tbody>
                        {% for trade in trades %}
                        <tr><td>{{ trade.uid }}</td><td>{{ trade.have_pet }}</td><td>{{ trade.want_pet }}</td></tr>
                        {% else %}
                        <tr><td colspan="3" style="text-align:center; color:#999;">暂无匹配信息</td></tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 右侧留言板 -->
        <div class="right-panel">
            <div class="card">
                <h3>🌟 暖心留言板</h3>
                <form action="/send_message" method="post">
                    <input type="text" name="nickname" placeholder="昵称" required style="width:100%; margin-bottom:10px;">
                    <textarea name="content" placeholder="写下你的祝福..." required style="width:100%; height:80px; padding:10px; border:1px solid #eee; border-radius:8px; margin-bottom:10px;"></textarea>
                    <button type="submit" class="btn" style="width:100%;">发布留言</button>
                </form>
                <div class="msg-list">
                    {% for msg in messages %}
                    <div class="msg-item"><strong>{{ msg.nickname }}</strong>: {{ msg.content }}</div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>

</body>
</html>
