<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>洛克王国精灵蛋互换站</title>
    <style>
        body {
            background-color: #fdf5e6; /* 浅米黄色背景 */
            font-family: "Microsoft YaHei", sans-serif;
            margin: 0;
            padding: 20px;
        }
        .header {
            text-align: center;
            color: #ff8c00;
            margin-bottom: 30px;
        }
        /* Flex 布局主容器 */
        .main-container {
            display: flex;
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
            align-items: flex-start;
        }
        /* 左侧看板样式 */
        .trade-section {
            flex: 2;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        /* 右侧留言板样式 */
        .message-section {
            flex: 1;
            min-width: 320px;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-top: 6px solid #ffcc00;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            border: 1px solid #eee;
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #fff9e6;
        }
        textarea {
            width: 100%;
            height: 150px;
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            resize: none;
        }
        .btn {
            width: 100%;
            background: #ffcc00;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        .msg-item {
            background: #fff9e6;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #ffcc00;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🥚 洛克王国精灵蛋互换站</h1>
    </div>

    <!-- 搜索栏保持在顶部 -->
    <div style="text-align: center; margin-bottom: 30px;">
        <form action="/" method="get">
            <input type="text" name="search" placeholder="搜索精灵名..." value="{{ search_query }}" style="padding: 10px; width: 300px; border-radius: 5px; border: 1px solid #ddd;">
            <button type="submit" style="padding: 10px 20px; background: #ffcc00; border: none; border-radius: 5px; color: white;">搜索</button>
        </form>
    </div>

    <!-- 主容器开始：并排显示 -->
    <div class="main-container">
        
        <!-- 左边：互换看板 -->
        <div class="trade-section">
            <h2>📜 实时互换看板</h2>
            <table>
                <thead>
                    <tr>
                        <th>UID</th>
                        <th>我有</th>
                        <th>我想换</th>
                    </tr>
                </thead>
                <tbody>
                    {% for trade in trades %}
                    <tr>
                        <td>{{ trade.uid }}</td>
                        <td>{{ trade.have_pet }}</td>
                        <td>{{ trade.want_pet }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <!-- 右边：留言板 -->
        <div class="message-section">
            <h2>🌟 暖心留言板</h2>
            <form action="/send_message" method="post">
                <input type="text" name="nickname" placeholder="你的昵称" required style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ddd; box-sizing: border-box;">
                <textarea name="content" placeholder="写下你的祝福..." required></textarea>
                <button type="submit" class="btn">发布留言</button>
            </form>

            <div style="margin-top: 25px; max-height: 400px; overflow-y: auto;">
                {% for msg in messages %}
                <div class="msg-item">
                    <strong>{{ msg.nickname }}</strong>: {{ msg.content }}
                </div>
                {% endfor %}
            </div>
        </div>

    </div>

</body>
</html>
