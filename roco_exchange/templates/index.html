<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>洛克王国精灵蛋互换站</title>
    <style>
        body { background-color: #fdf5e6; font-family: sans-serif; margin: 0; padding: 20px; }
        .header { text-align: center; color: #ff8c00; margin-bottom: 20px; }
        
        /* 表单和搜索共用的居中容器 */
        .top-section { max-width: 800px; margin: 0 auto 30px auto; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* Flex 布局主容器 */
        .main-container { display: flex; gap: 30px; max-width: 1200px; margin: 0 auto; align-items: flex-start; }
        .trade-section { flex: 2; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .message-section { flex: 1; min-width: 320px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 6px solid #ffcc00; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
        th { background-color: #fff9e6; }
        input, textarea { width: 100%; padding: 10px; margin: 5px 0 10px 0; border-radius: 5px; border: 1px solid #ddd; box-sizing: border-box; }
        textarea { height: 120px; resize: none; }
        .btn { background: #ffcc00; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        .msg-item { background: #fff9e6; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #ffcc00; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🥚 洛克王国精灵蛋互换站</h1>
    </div>

    <div class="top-section">
        <!-- 搜索功能 -->
        <div class="card" style="text-align: center;">
            <form action="/" method="get" style="display: flex; gap: 10px;">
                <input type="text" name="search" placeholder="搜索精灵名..." value="{{ search_query }}">
                <button type="submit" class="btn" style="width: 100px;">搜索</button>
            </form>
        </div>

        <!-- 发布功能 -->
        <div class="card">
            <h3 style="margin-top:0; color: #5d4037;">📢 发布互换信息</h3>
            <form action="/post" method="post">
                <input type="text" name="uid" placeholder="你的游戏 UID" required>
                <input type="text" name="have_pet" placeholder="我有的精灵蛋" required>
                <input type="text" name="want_pet" placeholder="想换的精灵蛋" required>
                <button type="submit" class="btn">发布互换信息</button>
            </form>
        </div>
    </div>

    <!-- 并排容器 -->
    <div class="main-container">
        <!-- 看板 -->
        <div class="trade-section">
            <h2>📜 实时互换看板</h2>
            <table>
                <thead>
                    <tr><th>UID</th><th>我有</th><th>我想换</th></tr>
                </thead>
                <tbody>
                    {% for trade in trades %}
                    <tr><td>{{ trade.uid }}</td><td>{{ trade.have_pet }}</td><td>{{ trade.want_pet }}</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <!-- 留言板 -->
        <div class="message-section">
            <h2>🌟 暖心留言板</h2>
            <form action="/send_message" method="post">
                <input type="text" name="nickname" placeholder="你的昵称" required>
                <textarea name="content" placeholder="写下你的祝福..." required></textarea>
                <button type="submit" class="btn">发布留言</button>
            </form>
            <div style="margin-top: 20px; max-height: 400px; overflow-y: auto;">
                {% for msg in messages %}
                <div class="msg-item"><strong>{{ msg.nickname }}</strong>: {{ msg.content }}</div>
                {% endfor %}
            </div>
        </div>
    </div>

</body>
</html>
